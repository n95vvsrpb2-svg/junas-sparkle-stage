<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Juna's Sparkle Stage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --stage: #1B0F2E;
    --stage-2: #2A1750;
    --pink: #FF2E92;
    --pink-soft: #FF7CB9;
    --gold: #FFD23F;
    --teal: #23E0C2;
    --paper: #FFF9F1;
    --lav: #E4D9FF;
    --ink: #2A1B3D;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, #3a2166 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #481a4c 0%, transparent 55%),
      var(--stage);
    min-height:100vh;
    font-family:'Quicksand',sans-serif;
    color:var(--lav);
    overflow-x:hidden;
    position:relative;
  }

  /* ambient sparkles */
  .sparkle-field{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .spark{position:absolute;font-size:14px;opacity:.55;animation:float 7s ease-in-out infinite;}
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(0deg);opacity:.35;}
    50%{transform:translateY(-22px) rotate(15deg);opacity:.9;}
  }
  @media (prefers-reduced-motion: reduce){
    .spark{animation:none;}
    *{animation-duration:.001s !important; transition-duration:.001s !important;}
  }

  .wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:28px 20px 80px;}

  /* header */
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand h1{
    font-family:'Baloo 2',cursive;
    font-size:clamp(26px,4vw,38px);
    margin:0;
    color:var(--gold);
    text-shadow:0 0 18px rgba(255,210,63,.45);
    letter-spacing:.5px;
  }
  .brand p{margin:2px 0 0;font-size:14px;color:var(--pink-soft);font-weight:600;}
  .mascot{width:58px;height:58px;flex-shrink:0;filter:drop-shadow(0 4px 10px rgba(0,0,0,.35));}

  .stagebtn{
    font-family:'Baloo 2',cursive;
    font-size:18px;
    font-weight:700;
    color:var(--stage);
    background:linear-gradient(180deg, var(--gold), #ffb830);
    border:none;
    border-radius:999px;
    padding:14px 26px;
    cursor:pointer;
    box-shadow:0 6px 0 #b8830c, 0 10px 20px rgba(0,0,0,.35);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .stagebtn:hover{transform:translateY(-2px);}
  .stagebtn:active{transform:translateY(3px);box-shadow:0 2px 0 #b8830c, 0 4px 10px rgba(0,0,0,.3);}
  .stagebtn:focus-visible{outline:3px solid var(--teal);outline-offset:3px;}

  /* hero */
  .hero{
    margin:18px 0 34px;
    padding:26px;
    border-radius:26px;
    background:linear-gradient(135deg, rgba(255,46,146,.18), rgba(35,224,194,.12));
    border:2px dashed rgba(255,255,255,.18);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:24px;
    flex-wrap:wrap;
    text-align:left;
  }
  .hero-text{flex:1 1 260px;min-width:220px;text-align:center;}
  .hero h2{
    font-family:'Baloo 2',cursive;
    font-size:clamp(22px,4vw,30px);
    color:var(--paper);
    margin:0 0 8px;
  }
  .hero p{margin:0 0 4px;color:var(--lav);font-size:16px;font-weight:600;}
  .hero-singer{width:150px;height:210px;flex-shrink:0;filter:drop-shadow(0 10px 18px rgba(0,0,0,.4));}
  @media (max-width:520px){
    .hero{flex-direction:column;text-align:center;}
    .hero-text{order:2;}
    .hero-singer{order:1;width:130px;height:182px;}
  }

  /* gallery */
  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:22px;
  }
  .card{
    background:var(--paper);
    color:var(--ink);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    position:relative;
    box-shadow:0 10px 24px rgba(0,0,0,.35);
    transition:transform .15s ease, box-shadow .15s ease;
    border:4px solid transparent;
  }
  .card:hover{transform:translateY(-4px) rotate(-.4deg);box-shadow:0 16px 30px rgba(0,0,0,.4);}
  .card:focus-visible{outline:3px solid var(--teal);outline-offset:2px;}
  .card .thumb{
    width:100%;height:150px;object-fit:cover;display:block;background:linear-gradient(135deg,#ffe0ef,#e0f7f2);
  }
  .card .noimg{
    width:100%;height:150px;display:flex;align-items:center;justify-content:center;
    font-size:44px;background:linear-gradient(135deg,#ffe0ef,#e0f7f2);
  }
  .card .body{padding:14px 16px 16px;}
  .card h3{
    font-family:'Baloo 2',cursive;
    margin:0 0 6px;font-size:19px;color:var(--pink);
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card p{margin:0;font-size:14px;line-height:1.4;color:#5b4a72;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card .stamps{margin-top:8px;font-size:16px;}
  .card .date{position:absolute;top:10px;right:10px;background:rgba(27,15,46,.75);color:var(--gold);
    font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;}

  .empty{
    text-align:center;padding:50px 20px;background:rgba(255,255,255,.05);border-radius:22px;
    border:2px dashed rgba(255,255,255,.2);
  }
  .empty .big{font-size:56px;margin-bottom:10px;}
  .empty h3{font-family:'Baloo 2',cursive;color:var(--paper);margin:0 0 6px;font-size:22px;}
  .empty p{color:var(--lav);margin:0 0 18px;font-weight:600;}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(15,7,26,.72);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:16px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--paper);color:var(--ink);border-radius:26px;max-width:560px;width:100%;
    max-height:88vh;overflow-y:auto;padding:26px;position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .modal h2{font-family:'Baloo 2',cursive;color:var(--pink);margin:4px 0 16px;font-size:26px;}
  .closebtn{
    position:absolute;top:14px;right:14px;background:var(--stage);color:var(--gold);border:none;
    width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;font-weight:700;
  }
  .closebtn:focus-visible{outline:3px solid var(--teal);}

  label{display:block;font-family:'Baloo 2',cursive;font-size:16px;color:var(--stage);margin:14px 0 6px;}
  input[type=text], textarea{
    width:100%;border:3px solid #f0d9ea;border-radius:14px;padding:12px 14px;font-family:'Quicksand',sans-serif;
    font-size:16px;font-weight:600;color:var(--ink);background:#fffefb;resize:vertical;
  }
  input[type=text]:focus, textarea:focus{outline:none;border-color:var(--pink-soft);}
  textarea{min-height:110px;}

  .imgpicker{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:6px;
  }
  .imgpicker label.filebtn{
    display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#0c3d34;
    padding:10px 18px;border-radius:999px;cursor:pointer;font-weight:700;margin:0;
    font-family:'Quicksand',sans-serif;font-size:14px;
  }
  .imgpicker input[type=file]{display:none;}
  .preview{width:90px;height:90px;border-radius:14px;object-fit:cover;display:none;border:3px solid var(--gold);}
  .removeimg{display:none;background:none;border:none;color:#c33;font-weight:700;cursor:pointer;font-size:13px;text-decoration:underline;}

  .stickerrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .stickerbtn{
    font-size:22px;background:#fffefb;border:3px solid #f0d9ea;border-radius:12px;width:46px;height:46px;
    cursor:pointer;transition:transform .1s;
  }
  .stickerbtn.active{border-color:var(--pink);background:#ffe6f2;transform:scale(1.08);}
  .stickerbtn:focus-visible{outline:3px solid var(--teal);}

  .modalactions{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}
  .btn-primary{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:16px;color:var(--stage);
    background:linear-gradient(180deg,var(--gold),#ffb830);border:none;border-radius:999px;
    padding:12px 22px;cursor:pointer;box-shadow:0 4px 0 #b8830c;
  }
  .btn-primary:active{transform:translateY(2px);box-shadow:0 2px 0 #b8830c;}
  .btn-secondary{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:16px;color:#fff;
    background:#7b6098;border:none;border-radius:999px;padding:12px 22px;cursor:pointer;
  }
  .btn-danger{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:15px;color:#fff;
    background:#e0507a;border:none;border-radius:999px;padding:12px 20px;cursor:pointer;margin-left:auto;
  }

  /* view modal */
  .view-img{width:100%;max-height:320px;object-fit:cover;border-radius:18px;margin-bottom:14px;}
  .view-text{font-size:16px;line-height:1.6;font-weight:600;white-space:pre-wrap;}
  .view-stamps{font-size:30px;margin-top:12px;}
  .view-date{font-size:12px;color:#8a76a3;font-weight:700;margin-bottom:4px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--stage);color:var(--gold);font-family:'Baloo 2',cursive;font-weight:700;
    padding:12px 22px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.4);
    opacity:0;pointer-events:none;transition:all .25s ease;z-index:60;font-size:15px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  footer{text-align:center;margin-top:50px;color:rgba(228,217,255,.5);font-size:13px;font-weight:600;}
</style>
</head>
<body>

<div class="sparkle-field" id="sparkleField"></div>

<div class="wrap">
  <header>
    <div class="brand">
      <svg class="mascot" viewBox="0 0 100 100" aria-hidden="true">
        <ellipse cx="50" cy="60" rx="34" ry="30" fill="#B98EFF"/>
        <circle cx="34" cy="34" r="10" fill="#B98EFF"/>
        <circle cx="66" cy="34" r="10" fill="#B98EFF"/>
        <circle cx="34" cy="34" r="5" fill="#FF2E92"/>
        <circle cx="66" cy="34" r="5" fill="#FF2E92"/>
        <circle cx="40" cy="58" r="5" fill="#1B0F2E"/>
        <circle cx="60" cy="58" r="5" fill="#1B0F2E"/>
        <path d="M42 70 Q50 78 58 70" stroke="#1B0F2E" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="26" cy="66" r="5" fill="#FFB3D9" opacity=".8"/>
        <circle cx="74" cy="66" r="5" fill="#FFB3D9" opacity=".8"/>
        <path d="M50 24 l3 7 7 1 -5 5 1 7 -6 -4 -6 4 1 -7 -5 -5 7 -1 z" fill="#FFD23F"/>
      </svg>
      <div>
        <h1>Juna's Sparkle Stage</h1>
        <p>my singing &amp; dancing story world ✨</p>
      </div>
    </div>
    <button class="stagebtn" id="newStoryBtn">+ New Story</button>
  </header>

  <div class="hero">
    <svg class="hero-singer" viewBox="0 0 150 210" aria-hidden="true">
      <!-- spotlight glow -->
      <polygon points="75,0 20,150 130,150" fill="#FFD23F" opacity="0.14"/>
      <ellipse cx="75" cy="188" rx="52" ry="10" fill="#000" opacity="0.25"/>

      <!-- stage platform -->
      <rect x="18" y="176" width="114" height="18" rx="9" fill="#FFD23F"/>
      <rect x="18" y="176" width="114" height="7" rx="3.5" fill="#FFE28A"/>
      <circle cx="34" cy="185" r="2.5" fill="#FF2E92"/>
      <circle cx="116" cy="185" r="2.5" fill="#23E0C2"/>
      <circle cx="75" cy="188" r="2.5" fill="#B98EFF"/>

      <!-- legs -->
      <rect x="64" y="140" width="9" height="38" rx="4" fill="#FFDCC2"/>
      <rect x="80" y="140" width="9" height="38" rx="4" fill="#FFDCC2"/>
      <rect x="60" y="172" width="17" height="9" rx="4" fill="#3A2166"/>
      <rect x="76" y="172" width="17" height="9" rx="4" fill="#3A2166"/>

      <!-- dress -->
      <path d="M56 96 Q75 84 94 96 L104 148 Q75 160 46 148 Z" fill="#FF2E92"/>
      <path d="M56 96 Q75 84 94 96 L98 112 Q75 122 52 112 Z" fill="#FF6BAE"/>
      <circle cx="62" cy="130" r="2.4" fill="#FFD23F"/>
      <circle cx="87" cy="122" r="2.4" fill="#FFD23F"/>
      <circle cx="75" cy="142" r="2.4" fill="#FFD23F"/>

      <!-- left arm resting on hip -->
      <path d="M56 100 Q42 112 46 130 Q48 136 56 134" stroke="#FFDCC2" stroke-width="9" fill="none" stroke-linecap="round"/>

      <!-- right arm raised holding microphone -->
      <path d="M94 100 Q108 90 106 72" stroke="#FFDCC2" stroke-width="9" fill="none" stroke-linecap="round"/>

      <!-- microphone -->
      <g transform="translate(106,50) rotate(15)">
        <rect x="-4" y="0" width="8" height="26" rx="4" fill="#3A2166"/>
        <circle cx="0" cy="-8" r="11" fill="#E4D9FF"/>
        <circle cx="0" cy="-8" r="11" fill="none" stroke="#3A2166" stroke-width="2"/>
        <line x1="-6" y1="-12" x2="6" y2="-12" stroke="#3A2166" stroke-width="1.6"/>
        <line x1="-7" y1="-8" x2="7" y2="-8" stroke="#3A2166" stroke-width="1.6"/>
        <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#3A2166" stroke-width="1.6"/>
      </g>

      <!-- neck + head -->
      <rect x="69" y="82" width="12" height="14" rx="5" fill="#FFDCC2"/>
      <circle cx="75" cy="66" r="20" fill="#FFDCC2"/>

      <!-- ponytail -->
      <path d="M92 58 Q108 56 108 74 Q108 90 96 92 Q104 76 92 66 Z" fill="#3A2166"/>
      <!-- hair top -->
      <path d="M55 62 Q56 42 75 40 Q96 40 96 60 Q88 50 75 50 Q60 50 55 62 Z" fill="#3A2166"/>

      <!-- face -->
      <circle cx="68" cy="66" r="2.2" fill="#3A2166"/>
      <circle cx="82" cy="66" r="2.2" fill="#3A2166"/>
      <path d="M69 74 Q75 79 81 74" stroke="#B5473D" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="60" cy="70" r="3.5" fill="#FF9EC4" opacity="0.7"/>
      <circle cx="90" cy="70" r="3.5" fill="#FF9EC4" opacity="0.7"/>

      <!-- hair bow -->
      <path d="M100 56 l7 -5 -1 7 z" fill="#FF2E92"/>
      <path d="M100 56 l7 5 -1 -7 z" fill="#FF2E92"/>
      <circle cx="100" cy="56" r="2" fill="#FFD23F"/>

      <!-- sparkles around her -->
      <path d="M28 60 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2 z" fill="#23E0C2" opacity="0.85"/>
      <path d="M122 100 l1.6 4 4 1.6 -4 1.6 -1.6 4 -1.6 -4 -4 -1.6 4 -1.6 z" fill="#FFD23F" opacity="0.9"/>
      <path d="M120 40 l1.4 3.4 3.4 1.4 -3.4 1.4 -1.4 3.4 -1.4 -3.4 -3.4 -1.4 3.4 -1.4 z" fill="#FF2E92" opacity="0.8"/>
    </svg>
    <div class="hero-text">
      <h2>Ready to shine? 🎤</h2>
      <p>Write about your songs, your dance moves, and your monster-hunting adventures!</p>
    </div>
  </div>

  <div id="galleryHolder"></div>

  <footer>made with love for a superstar 💖</footer>
</div>

<!-- Editor Modal -->
<div class="overlay" id="editorOverlay">
  <div class="modal">
    <button class="closebtn" id="closeEditor" aria-label="Close">✕</button>
    <h2 id="editorTitle">New Story</h2>

    <label for="titleInput">What's it called?</label>
    <input type="text" id="titleInput" maxlength="60" placeholder="My Big Dance Show!">

    <label for="textInput">Tell your story</label>
    <textarea id="textInput" maxlength="1200" placeholder="Today I learned a new dance move..."></textarea>

    <label>Add a picture</label>
    <div class="imgpicker">
      <label class="filebtn" for="fileInput">📷 Choose picture</label>
      <input type="file" id="fileInput" accept="image/*">
      <img id="imgPreview" class="preview" alt="Preview of your picture">
      <button class="removeimg" id="removeImgBtn" type="button">remove picture</button>
    </div>

    <label>Pick some stickers</label>
    <div class="stickerrow" id="stickerRow"></div>

    <div class="modalactions">
      <button class="btn-primary" id="saveBtn">✨ Publish my story!</button>
      <button class="btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn-danger" id="deleteBtn" style="display:none;">Delete story</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="overlay" id="viewOverlay">
  <div class="modal">
    <button class="closebtn" id="closeView" aria-label="Close">✕</button>
    <div class="view-date" id="viewDate"></div>
    <h2 id="viewTitle"></h2>
    <img id="viewImg" class="view-img" style="display:none;" alt="">
    <div class="view-text" id="viewText"></div>
    <div class="view-stamps" id="viewStamps"></div>
    <div class="modalactions">
      <button class="btn-secondary" id="editFromView">✏️ Edit</button>
      <button class="btn-secondary" id="closeViewBtn2">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STICKERS = ['🎤','💃','🕺','⭐','🎶','💖','🐯','⚔️','🌙','🔥','👑','🌈'];
const STORAGE_KEY = 'sparkle_stage_posts';
let posts = [];
let editingId = null;
let currentImageData = null;
let selectedStickers = new Set();

// ambient sparkle field
(function initSparkles(){
  const field = document.getElementById('sparkleField');
  const chars = ['✨','⭐','💫'];
  for(let i=0;i<16;i++){
    const s = document.createElement('div');
    s.className = 'spark';
    s.textContent = chars[Math.floor(Math.random()*chars.length)];
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*6)+'s';
    s.style.fontSize = (10+Math.random()*14)+'px';
    field.appendChild(s);
  }
})();

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

async function loadPosts(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    posts = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    posts = [];
  }
  renderGallery();
}

async function savePosts(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(posts), false);
  }catch(e){
    showToast('Oops, could not save 😥');
  }
}

function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
}

function renderGallery(){
  const holder = document.getElementById('galleryHolder');
  if(posts.length === 0){
    holder.innerHTML = `
      <div class="empty">
        <div class="big">🎬</div>
        <h3>No stories yet!</h3>
        <p>Tap "+ New Story" to share your first adventure.</p>
      </div>`;
    return;
  }
  const sorted = [...posts].sort((a,b)=> new Date(b.created) - new Date(a.created));
  holder.innerHTML = `<div class="gallery">${sorted.map(p => `
    <div class="card" tabindex="0" data-id="${p.id}" role="button" aria-label="Open story: ${escapeHtml(p.title)}">
      <div class="date">${formatDate(p.created)}</div>
      ${p.image ? `<img class="thumb" src="${p.image}" alt="">` : `<div class="noimg">🌟</div>`}
      <div class="body">
        <h3>${escapeHtml(p.title)}</h3>
        <p>${escapeHtml(p.text)}</p>
        ${p.stickers && p.stickers.length ? `<div class="stamps">${p.stickers.join(' ')}</div>` : ''}
      </div>
    </div>`).join('')}</div>`;

  holder.querySelectorAll('.card').forEach(card => {
    const open = () => openView(card.dataset.id);
    card.addEventListener('click', open);
    card.addEventListener('keydown', e => { if(e.key==='Enter' || e.key===' '){ e.preventDefault(); open(); }});
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// ---------- Editor ----------
function buildStickerRow(){
  const row = document.getElementById('stickerRow');
  row.innerHTML = STICKERS.map(s => `<button type="button" class="stickerbtn" data-s="${s}">${s}</button>`).join('');
  row.querySelectorAll('.stickerbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = btn.dataset.s;
      if(selectedStickers.has(s)){ selectedStickers.delete(s); btn.classList.remove('active'); }
      else { selectedStickers.add(s); btn.classList.add('active'); }
    });
  });
}

function openEditor(post){
  editingId = post ? post.id : null;
  document.getElementById('editorTitle').textContent = post ? 'Edit Story' : 'New Story';
  document.getElementById('titleInput').value = post ? post.title : '';
  document.getElementById('textInput').value = post ? post.text : '';
  currentImageData = post ? post.image : null;
  selectedStickers = new Set(post && post.stickers ? post.stickers : []);
  document.getElementById('deleteBtn').style.display = post ? 'inline-block' : 'none';

  buildStickerRow();
  selectedStickers.forEach(s => {
    const b = document.querySelector(`.stickerbtn[data-s="${s}"]`);
    if(b) b.classList.add('active');
  });

  const preview = document.getElementById('imgPreview');
  const removeBtn = document.getElementById('removeImgBtn');
  if(currentImageData){
    preview.src = currentImageData;
    preview.style.display = 'inline-block';
    removeBtn.style.display = 'inline-block';
  } else {
    preview.style.display = 'none';
    removeBtn.style.display = 'none';
  }
  document.getElementById('fileInput').value = '';

  document.getElementById('editorOverlay').classList.add('show');
  document.getElementById('titleInput').focus();
}

function closeEditor(){
  document.getElementById('editorOverlay').classList.remove('show');
}

document.getElementById('newStoryBtn').addEventListener('click', () => openEditor(null));
document.getElementById('closeEditor').addEventListener('click', closeEditor);
document.getElementById('cancelBtn').addEventListener('click', closeEditor);
document.getElementById('editorOverlay').addEventListener('click', e => { if(e.target.id==='editorOverlay') closeEditor(); });

document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW = 700;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      currentImageData = canvas.toDataURL('image/jpeg', 0.72);
      const preview = document.getElementById('imgPreview');
      preview.src = currentImageData;
      preview.style.display = 'inline-block';
      document.getElementById('removeImgBtn').style.display = 'inline-block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('removeImgBtn').addEventListener('click', () => {
  currentImageData = null;
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('removeImgBtn').style.display = 'none';
  document.getElementById('fileInput').value = '';
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const title = document.getElementById('titleInput').value.trim();
  const text = document.getElementById('textInput').value.trim();
  if(!title){ showToast('Give your story a name! ✏️'); document.getElementById('titleInput').focus(); return; }

  if(editingId){
    const p = posts.find(x => x.id === editingId);
    p.title = title; p.text = text; p.image = currentImageData; p.stickers = [...selectedStickers];
    showToast('Story updated! 🌟');
  } else {
    posts.push({
      id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      title, text, image: currentImageData,
      stickers: [...selectedStickers],
      created: new Date().toISOString()
    });
    showToast('Story published! 🎉');
  }
  await savePosts();
  renderGallery();
  closeEditor();
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
  if(!editingId) return;
  if(!confirm('Delete this story? This cannot be undone.')) return;
  posts = posts.filter(p => p.id !== editingId);
  await savePosts();
  renderGallery();
  closeEditor();
  showToast('Story deleted');
});

// ---------- View ----------
function openView(id){
  const p = posts.find(x => x.id === id);
  if(!p) return;
  document.getElementById('viewDate').textContent = formatDate(p.created);
  document.getElementById('viewTitle').textContent = p.title;
  document.getElementById('viewText').textContent = p.text;
  const img = document.getElementById('viewImg');
  if(p.image){ img.src = p.image; img.style.display='block'; } else { img.style.display='none'; }
  document.getElementById('viewStamps').textContent = (p.stickers||[]).join(' ');
  document.getElementById('editFromView').onclick = () => { document.getElementById('viewOverlay').classList.remove('show'); openEditor(p); };
  document.getElementById('viewOverlay').classList.add('show');
}
document.getElementById('closeView').addEventListener('click', () => document.getElementById('viewOverlay').classList.remove('show'));
document.getElementById('closeViewBtn2').addEventListener('click', () => document.getElementById('viewOverlay').classList.remove('show'));
document.getElementById('viewOverlay').addEventListener('click', e => { if(e.target.id==='viewOverlay') document.getElementById('viewOverlay').classList.remove('show'); });

document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    document.getElementById('editorOverlay').classList.remove('show');
    document.getElementById('viewOverlay').classList.remove('show');
  }
});

loadPosts();
</script>
</body>
